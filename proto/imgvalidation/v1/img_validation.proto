syntax = "proto3";

package imgvalidation.v1;

option go_package = "img-validation-service/internal/grpc/pb/imgvalidation/v1;imgvalidationv1";

service ImageValidationService {
  rpc ValidateImage(ValidateImageRequest) returns (ValidateImageResponse);
  rpc MatchFaces(MatchFacesRequest) returns (MatchFacesResponse);
  rpc CheckLiveness(CheckLivenessRequest) returns (CheckLivenessResponse);
}

message ValidateImageRequest {
  bytes image_data = 1;
  string content_type_hint = 2;
  string purpose = 3;
  string reference_id = 4;
}

message ValidateImageResponse {
  bool passed = 1;
  double nsfw_score = 2;
  bool format_valid = 3;
  string detected_mime_type = 4;
  int32 width = 5;
  int32 height = 6;
  int64 size_bytes = 7;
  repeated string rejection_reasons = 8;
  int32 face_count = 9;
  double face_confidence = 10;
}

// MatchFacesRequest compares the face in source_image (selfie) against target_image
// (a profile photo) and returns a cosine-similarity based match score.
message MatchFacesRequest {
  bytes source_image = 1;
  bytes target_image = 2;
  string reference_id = 3;
}

message MatchFacesResponse {
  bool matched = 1;
  double similarity = 2;
  int32 source_face_count = 3;
  int32 target_face_count = 4;
}

// CheckLivenessRequest runs anti-spoof (presentation attack detection) on a single frame.
message CheckLivenessRequest {
  bytes image_data = 1;
  string reference_id = 2;
}

message CheckLivenessResponse {
  bool live = 1;
  double score = 2;
}

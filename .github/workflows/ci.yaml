name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/kiso1770/img-validation-service
  OPENNSFW2_IMAGE: ghcr.io/kiso1770/opennsfw2-api
  FACEID_IMAGE: ghcr.io/kiso1770/faceid-api
  ANTISPOOF_IMAGE: ghcr.io/kiso1770/antispoof-api

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: golangci-lint
        run: golangci-lint run --timeout=5m

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — filesystem scan (CRITICAL+HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint-test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image tags
        id: prep
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            {
              echo 'tags<<EOF'
              echo "${{ env.IMAGE_NAME }}:dev-${{ github.sha }}"
              echo "${{ env.IMAGE_NAME }}:dev-latest"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            echo "pull_tag=dev-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            {
              echo 'tags<<EOF'
              echo "${{ env.IMAGE_NAME }}:${TAG}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            echo "pull_tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push img-validation-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push opennsfw2 sidecar
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/opennsfw2
          file: ./deploy/opennsfw2/Dockerfile
          push: true
          tags: |
            ${{ env.OPENNSFW2_IMAGE }}:dev-${{ github.sha }}
            ${{ env.OPENNSFW2_IMAGE }}:dev-latest
          cache-from: type=gha,scope=opennsfw2
          cache-to: type=gha,mode=max,scope=opennsfw2

      - name: Build and push faceid sidecar
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/faceid
          file: ./deploy/faceid/Dockerfile
          push: true
          tags: |
            ${{ env.FACEID_IMAGE }}:dev-${{ github.sha }}
            ${{ env.FACEID_IMAGE }}:dev-latest
          cache-from: type=gha,scope=faceid
          cache-to: type=gha,mode=max,scope=faceid

      - name: Build and push antispoof sidecar
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/antispoof
          file: ./deploy/antispoof/Dockerfile
          push: true
          tags: |
            ${{ env.ANTISPOOF_IMAGE }}:dev-${{ github.sha }}
            ${{ env.ANTISPOOF_IMAGE }}:dev-latest
          cache-from: type=gha,scope=antispoof
          cache-to: type=gha,mode=max,scope=antispoof

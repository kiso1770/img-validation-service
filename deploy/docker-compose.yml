version: '3.8'

services:
  opennsfw2:
    build: ./opennsfw2
    ports:
      - "8081:8081"

  faceid:
    build: ./faceid
    ports:
      - "8082:8082"

  antispoof:
    build: ./antispoof
    ports:
      - "8083:8083"

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      APP_NAME: img-validation-service
      HTTP_PORT: "8080"
      GRPC_PORT: "9090"
      NSFW_ENABLED: "true"
      NSFW_ENDPOINT: "http://opennsfw2:8081"
      NSFW_SCORE_THRESHOLD: "0.85"
      MAX_IMAGE_SIZE_BYTES: "10485760"
      FACE_ENABLED: "true"
      FACE_ENDPOINT: "http://faceid:8082"
      FACE_MATCH_THRESHOLD: "0.40"
      ANTISPOOF_ENABLED: "true"
      ANTISPOOF_ENDPOINT: "http://antispoof:8083"
      ANTISPOOF_MIN_SCORE: "0.70"
      LOG_LEVEL: debug
    depends_on:
      - opennsfw2
      - faceid
      - antispoof
